# Static droplet validation case for:
# 1) Laplace pressure balance / surface-tension accuracy
# 2) parasitic-current magnitude
#
# Recommended checks after the run:
# - use final_cell_fields.csv to compare mean pressure inside/outside the droplet
# - use history.csv / summary.csv to monitor max_velocity and divergence
# - inspect VTK snapshots to see whether residual flow is localized at the interface

name = static_droplet_surface_tension_validation_128
mode = coupled

# Grid / output
nx = 128
ny = 128
ghost = 3
dt = 2e-7
steps = 5000
output_every = 100
write_every = 500
restart_every = 500
verbose = false
print_step_log = true
write_vtk = true
write_restart = true
restart = false
output_dir = output

# Solvers
pressure_scheme = icpcg
poisson_iterations = 1200
pressure_tolerance = 1e-10

ch_inner_iterations = 80
ch_tolerance = 1e-8
momentum_iterations = 200
momentum_tolerance = 1e-8

# Domain / droplet
lx = 1.0
ly = 1.0
interface_center_x = 0.5
interface_center_y = 0.5
interface_radius = 0.16

# Dimensionless parameters
re = 50.0
ca = 1.0
cn = 0.02
pe = 150.0
density_ratio = 1.0
viscosity_ratio = 1.0
surface_tension_multiplier = 1.0

# Keep the droplet away from walls so pressure jump and spurious currents
# are dominated by interface discretization rather than boundary treatment.
periodic_x = true
periodic_y = true

# Start from rest
advect_u = 0.0
advect_v = 0.0
body_force_x = 0.0
body_force_y = 0.0

# CH stabilization coefficients are now derived from Cn in code:
#   a1 = 3*sqrt(2)/(16*Cn), a2 = 3*sqrt(2)*Cn/4

# Loose enough to avoid false FAIL while still flagging obvious instability
check_mass_drift_max = 1e-5
check_divergence_max = 1e-6
check_mu_max = 1e4
check_velocity_max = 1.0
