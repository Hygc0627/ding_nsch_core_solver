# HyDEA-compatible Rayleigh-Taylor-type instability surrogate.
#
# Important limitation:
#   The local split-HyDEA backend currently requires both:
#     1) grid_nx = grid_ny = 192
#     2) dx == dy
#   so the Ding 2007 paper geometry [0,d] x [0,4d] cannot be used directly.
#
# This case therefore keeps the same physical intent:
#   At = 0.50
#   Re = 3000
#   zero surface tension
#   single-mode sinusoidal interface perturbation
# but moves to a square 192x192 box so the current HyDEA path is actually
# runnable.

name = rayleigh_taylor_hydea_square_surrogate_192x192
mode = coupled

nx = 192
ny = 192
ghost = 3
dt = 3.5e-4
steps = 7200
output_every = 100
write_every = 100
restart_every = 100
verbose = false
write_vtk = true
write_restart = true
restart = false
output_dir = output

pressure_scheme = paper_split_hydea
poisson_iterations = 1200
pressure_tolerance = 1e-6

petsc_python_executable = /home/weiyy/anaconda3/envs/pybind_env/bin/python3
hydea_solver_script = python/hydea_pressure_solver.py
hydea_solver_config = python/hydea_pressure_options_alternating_100_1.py
hydea_model_path = /home/weiyy/phaseField/dinghang/HyDEA/PetIBM/examples/navierstokesHyDEA/192cavity/Logger/fluid model net fluid_model/2024-07-10 175806/states/1000.state
petsc_pressure_log_every = 50

ch_inner_iterations = 80
ch_tolerance = 1e-8
momentum_iterations = 240
momentum_tolerance = 1e-8

lx = 1.0
ly = 1.0
interface_radius = 0.0
interface_center_y = 0.5
interface_amplitude = 0.05
interface_wavenumber = 1.0
invert_phase = true

re = 3000.0
ca = 1.0
pe = 1000.0
cn = 0.0015625
density_ratio = 0.333333333333
viscosity_ratio = 1.0
surface_tension_multiplier = 0.0

periodic_x = true
periodic_y = false

u_bc_bottom_type = neumann
u_bc_bottom_value = 0.0
u_bc_top_type = neumann
u_bc_top_value = 0.0

v_bc_bottom_type = dirichlet
v_bc_bottom_value = 0.0
v_bc_top_type = dirichlet
v_bc_top_value = 0.0

advect_u = 0.0
advect_v = 0.0

body_force_x = 0.0
body_force_y = -1.0


check_mass_drift_max = 5e-2
check_divergence_max = 5e-2
check_mu_max = 1e8
check_velocity_max = 50.0
