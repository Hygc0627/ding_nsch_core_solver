# PETSc-compatible Rayleigh-Taylor-type instability surrogate on a 192x192 grid.
#
# This case is intended to match the HyDEA-compatible square surrogate as
# closely as possible, so the two split-pressure backends can be compared on
# the same geometry and discretization.
#
# Physical intent retained from Ding et al. (JCP 2007) §4.2.1:
#   At = 0.50
#   Re = 3000
#   zero surface tension
#   single-mode sinusoidal interface perturbation
#
# Geometry adaptation:
#   The paper uses [0,d] x [0,4d] on 200x800. Here we use a square 192x192 box
#   so it lines up with the current local HyDEA pressure-model constraints.

name = rayleigh_taylor_petsc_square_surrogate_192x192
mode = coupled

nx = 192
ny = 192
ghost = 3
dt = 3.5e-4
steps = 7200
output_every = 100
write_every = 100
restart_every = 100
verbose = false
write_vtk = true
write_restart = true
restart = false
output_dir = output

pressure_scheme = paper_split_petsc_pcg
poisson_iterations = 1200
pressure_tolerance = 1e-6

petsc_python_executable = /home/weiyy/anaconda3/envs/pybind_env/bin/python3
petsc_solver_script = python/petsc_pressure_solver.py
petsc_solver_config = python/petsc_pressure_options.py
petsc_pressure_log_every = 50

ch_inner_iterations = 80
ch_tolerance = 1e-8
momentum_iterations = 240
momentum_tolerance = 1e-8

lx = 1.0
ly = 1.0
interface_radius = 0.0
interface_center_y = 0.5
interface_amplitude = 0.05
interface_wavenumber = 1.0
invert_phase = true

re = 3000.0
ca = 1.0
pe = 1000.0
cn = 0.0015625
density_ratio = 0.333333333333
viscosity_ratio = 1.0
surface_tension_multiplier = 0.0

periodic_x = true
periodic_y = false

u_bc_bottom_type = neumann
u_bc_bottom_value = 0.0
u_bc_top_type = neumann
u_bc_top_value = 0.0

v_bc_bottom_type = dirichlet
v_bc_bottom_value = 0.0
v_bc_top_type = dirichlet
v_bc_top_value = 0.0

advect_u = 0.0
advect_v = 0.0

body_force_x = 0.0
body_force_y = -1.0

stabilization_a1 = 0.03125
stabilization_a2 = 0.125

check_mass_drift_max = 5e-2
check_divergence_max = 5e-2
check_mu_max = 1e8
check_velocity_max = 50.0
