# Shear-driven droplet deformation
# Sharper-interface and finer-grid variant.
#
# Compared with the 64x64 reference:
# - grid is doubled to 128x128
# - cn is reduced to 0.01
# - dt is reduced to keep the startup conservative
# - final_time is kept at 0.4
#
# This is the more meaningful benchmark configuration if you want a thinner
# interface without under-resolving it.

name = shear_droplet_deformation_cn0p01_128
mode = coupled

# Grid and time
nx = 128
ny = 128
ghost = 3
dt = 1e-5
steps = 160000
output_every = 2000
write_every = 200
verbose = false
write_vtk = true
output_dir = output

# Pressure solver
pressure_scheme = icpcg
poisson_iterations = 400
pressure_tolerance = 1e-9

# CH / momentum linear solves
ch_inner_iterations = 50
ch_tolerance = 1e-8
momentum_iterations = 150
momentum_tolerance = 1e-8

# Domain: L = H = 1, droplet radius R0 = 0.25 => L = H = 4 * R0
lx = 1.0
ly = 1.0
interface_center_x = 0.5
interface_center_y = 0.5
interface_radius = 0.25

# Dimensionless groups
cn = 0.01
pe = 150.0
re = 0.1
ca = 0.45
density_ratio = 1.0
viscosity_ratio = 1.0

# Boundary conditions
periodic_x = true
periodic_y = false
top_wall_velocity_x = 1.0
bottom_wall_velocity_x = -1.0

# Initial velocity
advect_u = 0.0
advect_v = 0.0

# Body force
body_force_x = 0.0
body_force_y = 0.0


# Pass/fail thresholds
check_mass_drift_max = 1e-2
check_divergence_max = 1e-2
check_mu_max = 1e4
check_velocity_max = 10.0
