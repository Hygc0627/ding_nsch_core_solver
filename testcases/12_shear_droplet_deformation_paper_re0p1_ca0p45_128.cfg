# Shear-driven droplet deformation
# Paper-equivalent parameterization for the common definitions
#
# Paper definitions:
#   Re_paper = rho * gamma_dot * R0^2 / mu
#   Ca_paper = mu * gamma_dot * R0 / sigma
#
# This solver uses domain-scale Re/Ca directly in the equations.
# For this geometry and wall speed:
#   H = 1, R0 = 0.25, U_top = 1, U_bottom = -1
#   gamma_dot = (U_top - U_bottom) / H = 2
#   gamma_dot * R0 = 0.5
# so:
#   Re_solver = Re_paper / (gamma_dot * R0^2) = 0.1 / 0.125 = 0.8
#   Ca_solver = Ca_paper / (gamma_dot * R0)   = 0.45 / 0.5 = 0.9
#
# This case is therefore the one to use if you want to compare against
# literature curves reported as Re = 0.1, Ca = 0.45.
#
# If you want to rerun this case from scratch while an old output directory
# already exists, change `name` or `output_dir` before launching. Otherwise
# old VTK files from the previous run will remain in the same folder.

name = shear_droplet_deformation_paper_re0p1_ca0p45_128
mode = coupled

# Grid and time
nx = 128
ny = 128
ghost = 3
dt = 1e-5
steps = 160000
output_every = 2000
write_every = 200
restart_every = 200
verbose = false
write_vtk = true
write_restart = true
restart = false
output_dir = output

# Pressure solver
pressure_scheme = icpcg
poisson_iterations = 400
pressure_tolerance = 1e-9

# CH / momentum linear solves
ch_inner_iterations = 50
ch_tolerance = 1e-8
momentum_iterations = 150
momentum_tolerance = 1e-8

# Domain: L = H = 1, droplet radius R0 = 0.25 => L = H = 4 * R0
lx = 1.0
ly = 1.0
interface_center_x = 0.5
interface_center_y = 0.5
interface_radius = 0.25

# Dimensionless groups
cn = 0.01
pe = 150.0
re = 0.8
ca = 0.9
density_ratio = 1.0
viscosity_ratio = 1.0

# Boundary conditions
periodic_x = true
periodic_y = false
top_wall_velocity_x = 1.0
bottom_wall_velocity_x = -1.0

# Initial velocity
advect_u = 0.0
advect_v = 0.0

# Body force
body_force_x = 0.0
body_force_y = 0.0


# Pass/fail thresholds
check_mass_drift_max = 1e-2
check_divergence_max = 1e-2
check_mu_max = 1e4
check_velocity_max = 10.0
