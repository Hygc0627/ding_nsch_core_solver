# Shear-driven droplet deformation
# Reference setup for the current 2D MAC-grid CHNS solver.
#
# Physical target:
# Re = 0.1
# Ca = 0.45
# viscosity ratio lambda = 1
# density ratio alpha = 1
# L = H = 4 * R0

name = shear_droplet_deformation_reference
mode = coupled

# Grid and time
nx = 64
ny = 64
ghost = 3
dt = 1e-5
steps = 100000
output_every = 1000
write_every = 100
verbose = false
write_vtk = true
output_dir = output

# Pressure solver
pressure_scheme = icpcg
poisson_iterations = 200
pressure_tolerance = 1e-9

# CH / momentum linear solves
ch_inner_iterations = 30
ch_tolerance = 1e-8
momentum_iterations = 100
momentum_tolerance = 1e-8

# Domain: L = H = 1, droplet radius R0 = 0.25 => L = H = 4 * R0
lx = 1.0
ly = 1.0
interface_center_x = 0.5
interface_center_y = 0.5
interface_radius = 0.25

# Dimensionless groups
cn = 0.02
pe = 150.0
re = 0.1
ca = 0.45
density_ratio = 1.0
viscosity_ratio = 1.0

# Boundary conditions
# Periodic in x, moving walls in y
periodic_x = true
periodic_y = false
top_wall_velocity_x = 1.0
bottom_wall_velocity_x = -1.0

# Initial velocity
# With periodic_y = false and nonzero wall velocities, the solver initializes a Couette profile automatically.
advect_u = 0.0
advect_v = 0.0

# Body force
body_force_x = 0.0
body_force_y = 0.0


# Pass/fail thresholds
check_mass_drift_max = 1e-2
check_divergence_max = 1e-2
check_mu_max = 1e4
check_velocity_max = 10.0
