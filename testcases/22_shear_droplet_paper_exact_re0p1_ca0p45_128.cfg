# Shear-driven droplet deformation with parameter meanings matched exactly to
# the common literature definitions:
#
#   Re = rho * gamma_dot * R0^2 / mu = 0.1
#   Ca = mu * gamma_dot * R0 / sigma = 0.45
#   H  = 4 * R0
#   alpha = 1  -> density_ratio = 1
#   lambda = 1 -> viscosity_ratio = 1
#
# To make those meanings identical inside this solver, this case uses:
#   length scale   = R0
#   velocity scale = gamma_dot * R0
#
# Therefore, in solver coordinates:
#   R0 = 1
#   H  = 4
#   L  = 4
#   gamma_dot = 1
#
# For symmetric moving walls:
#   u_top    = +gamma_dot * H / 2 = +2
#   u_bottom = -gamma_dot * H / 2 = -2
#
# With this setup:
#   solver time t == literature shear time gamma_dot * t_physical
# so the horizontal axis in D(t) can be compared directly to literature plots.

name = shear_droplet_paper_exact_re0p1_ca0p45_128
mode = coupled

# Grid and time
nx = 128
ny = 128
ghost = 3
dt = 2e-4
steps = 150000
output_every = 1000
write_every = 1000
restart_every = 1000
verbose = false
write_vtk = true
write_restart = true
restart = false
output_dir = output

# Pressure solver
pressure_scheme = icpcg
poisson_iterations = 400
pressure_tolerance = 1e-9

# CH / momentum linear solves
ch_inner_iterations = 50
ch_tolerance = 1e-8
momentum_iterations = 150
momentum_tolerance = 1e-8

# Geometry in units of R0
lx = 4.0
ly = 4.0
interface_center_x = 2.0
interface_center_y = 2.0
interface_radius = 1.0

# Dimensionless groups with the exact paper meanings above
re = 0.1
ca = 0.45

# Phase-field parameters.
# cn = 0.04 gives the same interface thickness relative to R0 as
# cn = 0.01 in the old unit-box / R0 = 0.25 setup.
cn = 0.04
pe = 150.0
density_ratio = 1.0
viscosity_ratio = 1.0

# Boundary conditions
periodic_x = true
periodic_y = false
top_wall_velocity_x = 2.0
bottom_wall_velocity_x = -2.0

# Initial velocity
advect_u = 0.0
advect_v = 0.0

# Body force
body_force_x = 0.0
body_force_y = 0.0


# Pass/fail thresholds
check_mass_drift_max = 1e-2
check_divergence_max = 1e-2
check_mu_max = 1e4
check_velocity_max = 10.0
