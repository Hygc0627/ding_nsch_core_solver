# Shear-driven droplet deformation with parameter meanings matched exactly to
# the common literature definitions:
#
#   Re = rho * gamma_dot * R0^2 / mu = 0.1
#   Ca = mu * gamma_dot * R0 / sigma = 0.45
#   H  = 4 * R0
#   lambda = 1
#
# This case changes only the density ratio to 1:5 in the solver's usual sense:
#   c = 1 phase density = 1
#   c = 0 phase density = 0.2
# so the max/min density ratio is 5.
#
# To make the nondimensional meanings identical inside this solver, this case uses:
#   length scale   = R0
#   velocity scale = gamma_dot * R0
#
# Therefore, in solver coordinates:
#   R0 = 1
#   H  = 4
#   L  = 4
#   gamma_dot = 1
#
# For symmetric moving walls:
#   u_top    = +gamma_dot * H / 2 = +2
#   u_bottom = -gamma_dot * H / 2 = -2
#
# With this setup:
#   solver time t == literature shear time gamma_dot * t_physical
# so the horizontal axis in D(t) can be compared directly to literature plots.

name = shear_droplet_paper_exact_re0p1_ca0p45_128_cn0p03_dr1to5_petsc
mode = coupled

# Grid and time
nx = 128
ny = 128
ghost = 3
dt = 1.2e-4
steps = 250000
output_every = 1000
write_every = 1000
restart_every = 1000
verbose = false
write_vtk = true
write_restart = true
restart = false
output_dir = output

# Pressure solver: PETSc-backed CG + ICC configured in Python
pressure_scheme = petsc_pcg
poisson_iterations = 1000
pressure_tolerance = 1e-9
petsc_python_executable = /home/weiyy/anaconda3/envs/pybind_env/bin/python3
petsc_solver_script = python/petsc_pressure_solver.py
petsc_solver_config = python/petsc_pressure_options.py

# CH / momentum linear solves
ch_inner_iterations = 60
ch_tolerance = 1e-8
momentum_iterations = 180
momentum_tolerance = 1e-8

# Geometry in units of R0
lx = 4.0
ly = 4.0
interface_center_x = 2.0
interface_center_y = 2.0
interface_radius = 1.0

# Dimensionless groups with the exact paper meanings
re = 0.1
ca = 0.45
cn = 0.03
pe = 150.0

# Density ratio 1:5, viscosity ratio 1:1
density_ratio = 0.2
viscosity_ratio = 1.0

# Boundary conditions
periodic_x = true
periodic_y = false
u_bc_bottom_type = dirichlet
u_bc_bottom_value = -2.0
u_bc_top_type = dirichlet
u_bc_top_value = 2.0
v_bc_bottom_type = dirichlet
v_bc_bottom_value = 0.0
v_bc_top_type = dirichlet
v_bc_top_value = 0.0

# Initial velocity
advect_u = 0.0
advect_v = 0.0

# Body force
body_force_x = 0.0
body_force_y = 0.0


# Pass/fail thresholds
check_mass_drift_max = 1e-2
check_divergence_max = 1e-2
check_mu_max = 1e4
check_velocity_max = 10.0
