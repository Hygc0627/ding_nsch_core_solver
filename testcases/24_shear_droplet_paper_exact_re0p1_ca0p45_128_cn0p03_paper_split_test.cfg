# Same physical setup as case 23, but using the split pressure projection
# form
#
#   div[(1/rho^{n+1}) grad p^{n+1}]
#     = (1/dt) div(u*)
#
# with
#
#   1/rho^{n+1} grad p^{n+1}
#   = 1/rho_ref grad p^{n+1}
#   + (1/rho^{n+1} - 1/rho_ref) grad(2 p^n - p^{n-1})
#
# This corresponds to the paper_split_icpcg option.

name = shear_droplet_paper_exact_re0p1_ca0p45_128_cn0p03_paper_split_test
mode = coupled

nx = 128
ny = 128
ghost = 3
dt = 1.2e-4
steps = 30000
output_every = 1000
write_every = 1000
restart_every = 1000
verbose = false
write_vtk = true
write_restart = true
restart = false
output_dir = output

pressure_scheme = paper_split_icpcg
poisson_iterations = 400
pressure_tolerance = 1e-9

ch_inner_iterations = 60
ch_tolerance = 1e-8
momentum_iterations = 180
momentum_tolerance = 1e-8

lx = 4.0
ly = 4.0
interface_center_x = 2.0
interface_center_y = 2.0
interface_radius = 1.0

re = 0.1
ca = 0.45
cn = 0.03
pe = 150.0
density_ratio = 1.0
viscosity_ratio = 1.0

periodic_x = true
periodic_y = false
top_wall_velocity_x = 2.0
bottom_wall_velocity_x = -2.0

advect_u = 0.0
advect_v = 0.0

body_force_x = 0.0
body_force_y = 0.0


check_mass_drift_max = 1e-2
check_divergence_max = 1e-2
check_mu_max = 1e4
check_velocity_max = 10.0
