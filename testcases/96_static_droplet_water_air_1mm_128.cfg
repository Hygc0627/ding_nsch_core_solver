# Static droplet for a water-air interface using capillary-inertial scaling.
#
# Reference physical values at about 20 C:
#   rho_l = 998.2 kg/m^3      (water)
#   mu_l  = 1.002e-3 Pa s     (water)
#   rho_g = 1.204 kg/m^3      (air)
#   mu_g  = 1.81e-5 Pa s      (air)
#   sigma = 7.28e-2 N/m       (water-air)
#
# Reference length:
#   L_ref = R_drop = 1.0e-3 m
#
# Capillary-inertial reference velocity:
#   U_ref = sqrt(sigma / (rho_l * L_ref)) = 2.700579128582e-1 m/s
#
# Dimensionless groups under this scaling:
#   Re = rho_l * U_ref * L_ref / mu_l     = 2.690337411328e+2
#   Ca = mu_l * U_ref / sigma             = 3.717005888516e-3
#   density_ratio   = rho_g / rho_l       = 1.206171107994e-3
#   viscosity_ratio = mu_g / mu_l         = 1.806387225549e-2
#
# Because Re * Ca = 1 here, the solver's surface-tension scale 1/(Re*Ca)
# equals 1. The nondimensional Laplace jump is therefore:
#   Delta p* = 1 / R* = 1 / 0.16 = 6.25
#
# Physical interpretation of this nondimensional domain:
#   interface_radius = 0.16  -> R_drop = 1.0 mm
#   lx = ly = 1.0            -> domain size = 6.25 mm x 6.25 mm
#   capillary time t_ref     = L_ref / U_ref = 3.702909458998e-3 s
#   pressure scale           = rho_l * U_ref^2 = sigma / L_ref = 72.8 Pa
#   expected Laplace jump    = sigma / R_drop = 72.8 Pa

name = static_droplet_water_air_1mm_128
mode = coupled

# Grid / output
nx = 128
ny = 128
ghost = 3
dt = 2e-7
steps = 5000
output_every = 100
write_every = 500
restart_every = 500
verbose = false
print_step_log = true
write_vtk = true
write_restart = true
restart = false
output_dir = output/96

# Solvers
pressure_scheme = icpcg
poisson_iterations = 1200
pressure_tolerance = 1e-10

ch_inner_iterations = 80
ch_tolerance = 1e-8
momentum_iterations = 200
momentum_tolerance = 1e-8

# Domain / droplet
lx = 1.0
ly = 1.0
interface_center_x = 0.5
interface_center_y = 0.5
interface_radius = 0.16

# Dimensionless parameters
re = 269.0337411328
ca = 0.003717005888516
cn = 0.02
pe = 150.0
density_ratio = 0.001206171107994
viscosity_ratio = 0.01806387225549
surface_tension_multiplier = 1.0

# Keep the droplet away from walls so pressure jump and spurious currents
# are dominated by interface discretization rather than boundary treatment.
periodic_x = true
periodic_y = true

# Start from rest
advect_u = 0.0
advect_v = 0.0
body_force_x = 0.0
body_force_y = 0.0

# CH stabilization coefficients are now derived from Cn in code:
#   a1 = 3*sqrt(2)/(16*Cn), a2 = 3*sqrt(2)*Cn/4

# Loose enough to avoid false FAIL while still flagging obvious instability
check_mass_drift_max = 1e-5
check_divergence_max = 1e-6
check_mu_max = 1e4
check_velocity_max = 1.0
