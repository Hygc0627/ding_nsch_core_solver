# Rayleigh-Taylor instability case following Ding et al. (JCP 2007) §4.2.1,
# using the split pressure Poisson equation with the PETSc CG+ICC backend.
#
# Paper-side setup recovered from the PDF text:
#   Atwood number At = 0.50
#   Reynolds number Re = 3000
#   zero surface tension
#   domain [0,d] x [0,4d]
#   initial interface y(x) = 2d + 0.1d*cos(2*pi*x/d)
#   grid 200 x 800
#   Cn = 0.0015
#   dt = 0.00035
#
# Current-solver mapping:
#   - Use d = 1.
#   - Use interface_radius = 0 to trigger the sinusoidal planar interface.
#   - Default planar-interface initializer puts c=1 below the interface and
#     c=0 above it. To match the paper's "heavy fluid on top of lighter fluid"
#     while keeping the heavy fluid as the solver reference phase, set
#     invert_phase = true and density_ratio = rho_light / rho_heavy = 1/3.
#   - Zero surface tension is enforced through surface_tension_multiplier = 0.
#   - The paper text fragment we recovered does not explicitly restate the wall
#     boundary conditions for this subsection; here we use the standard RTI
#     surrogate in this codebase: x-periodic and slip/no-penetration at y walls.

name = rayleigh_taylor_ding2007_split_petsc_200x800
mode = coupled

nx = 200
ny = 800
ghost = 3
dt = 3.5e-4
steps = 7200
output_every = 100
write_every = 100
restart_every = 100
verbose = false
write_vtk = true
write_restart = true
restart = false
output_dir = output

pressure_scheme = paper_split_petsc_pcg
poisson_iterations = 1200
pressure_tolerance = 1e-6

petsc_python_executable = /home/weiyy/anaconda3/envs/pybind_env/bin/python3
petsc_solver_script = python/petsc_pressure_solver.py
petsc_solver_config = python/petsc_pressure_options.py
petsc_pressure_log_every = 50

ch_inner_iterations = 80
ch_tolerance = 1e-8
momentum_iterations = 240
momentum_tolerance = 1e-8

lx = 1.0
ly = 4.0
interface_radius = 0.0
interface_center_y = 2.0
interface_amplitude = 0.1
interface_wavenumber = 1.0
invert_phase = true

re = 3000.0
ca = 1.0
pe = 1000.0
cn = 0.0015
density_ratio = 0.333333333333
viscosity_ratio = 1.0
surface_tension_multiplier = 0.0

periodic_x = true
periodic_y = false

u_bc_bottom_type = neumann
u_bc_bottom_value = 0.0
u_bc_top_type = neumann
u_bc_top_value = 0.0

v_bc_bottom_type = dirichlet
v_bc_bottom_value = 0.0
v_bc_top_type = dirichlet
v_bc_top_value = 0.0

advect_u = 0.0
advect_v = 0.0

body_force_x = 0.0
body_force_y = -1.0

stabilization_a1 = 0.03125
stabilization_a2 = 0.125

check_mass_drift_max = 5e-2
check_divergence_max = 5e-2
check_mu_max = 1e8
check_velocity_max = 50.0
