# Rising bubble benchmark inspired by Hysing case 1, using the
# pressure-split projection variant.
#
# Same physical/nondimensional parameters as:
#   25_rising_bubble_hysing1_refbubble_96x192.cfg
# The only intended change is the pressure Poisson formulation.

name = rising_bubble_hysing1_refbubble_96x192_split_icpcg
mode = coupled

nx = 96
ny = 192
ghost = 3
dt = 2e-4
steps = 4243
output_every = 500
write_every = 500
restart_every = 500
verbose = false
write_vtk = true
write_restart = true
restart = false
output_dir = output

pressure_scheme = paper_split_icpcg
poisson_iterations = 500
pressure_tolerance = 1e-9

ch_inner_iterations = 60
ch_tolerance = 1e-8
momentum_iterations = 200
momentum_tolerance = 1e-8

lx = 4.0
ly = 8.0
interface_center_x = 2.0
interface_center_y = 2.0
interface_radius = 1.0

re = 12.374368670764582
ca = 0.02020305007471719
cn = 0.04
pe = 150.0
density_ratio = 10.0
viscosity_ratio = 10.0

periodic_x = false
periodic_y = false
top_wall_velocity_x = 0.0
bottom_wall_velocity_x = 0.0

advect_u = 0.0
advect_v = 0.0

body_force_x = 0.0
body_force_y = -1.0


check_mass_drift_max = 1e-2
check_divergence_max = 1e-2
check_mu_max = 1e5
check_velocity_max = 20.0
