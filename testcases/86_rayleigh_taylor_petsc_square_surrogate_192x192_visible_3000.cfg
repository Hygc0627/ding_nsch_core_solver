# 192x192 PETSc RTI surrogate tuned so visible interface deformation should
# appear within roughly the first few thousand steps.
#
# Relative to the extra-conservative stable case:
#   - larger fixed dt, but still below the initial CH-explicit estimate
#   - larger initial perturbation amplitude
#   - slightly larger box so the interface has more room to roll up
#   - keep Re=1000 rather than the aggressive Re=3000 setting
#
# Target use:
#   around 3000 steps, the interface evolution should be more obvious than in
#   testcase 85, without reverting to the violently unstable timestep used in
#   testcase 84.

name = rayleigh_taylor_petsc_square_surrogate_192x192_visible_3000
mode = coupled

nx = 192
ny = 192
ghost = 3
dt = 5e-6
steps = 12000
output_every = 200
write_every = 200
restart_every = 200
verbose = false
write_vtk = true
write_restart = true
restart = false
output_dir = output

pressure_scheme = paper_split_petsc_pcg
poisson_iterations = 1200
pressure_tolerance = 1e-6

petsc_python_executable = /home/weiyy/anaconda3/envs/pybind_env/bin/python3
petsc_solver_script = python/petsc_pressure_solver.py
petsc_solver_config = python/petsc_pressure_options.py
petsc_pressure_log_every = 50

ch_inner_iterations = 80
ch_tolerance = 1e-8
momentum_iterations = 240
momentum_tolerance = 1e-8

lx = 1.2
ly = 1.2
interface_radius = 0.0
interface_center_y = 0.6
interface_amplitude = 0.045
interface_wavenumber = 1.0
invert_phase = true

re = 1000.0
ca = 1.0
pe = 3000.0
cn = 0.0015625
density_ratio = 0.1
viscosity_ratio = 1.0
surface_tension_multiplier = 0.0

periodic_x = true
periodic_y = false

u_bc_bottom_type = neumann
u_bc_bottom_value = 0.0
u_bc_top_type = neumann
u_bc_top_value = 0.0

v_bc_bottom_type = dirichlet
v_bc_bottom_value = 0.0
v_bc_top_type = dirichlet
v_bc_top_value = 0.0

advect_u = 0.0
advect_v = 0.0

body_force_x = 0.0
body_force_y = -9.8


check_mass_drift_max = 5e-2
check_divergence_max = 5e-2
check_mu_max = 1e8
check_velocity_max = 50.0
