# Same planar surrogate as 31_rising_bubble_ding2007_planar_stable.cfg,
# but using the original variable-coefficient pressure Poisson solve with
# the PETSc CG+ICC backend configured in Python.

name = rising_bubble_ding2007_planar_stable_petsc
mode = coupled

nx = 128
ny = 128
ghost = 3
dt = 1e-4
steps = 10000
output_every = 500
write_every = 500
restart_every = 500
verbose = false
write_vtk = true
write_restart = true
restart = false
output_dir = output

pressure_scheme = petsc_pcg
poisson_iterations = 800
pressure_tolerance = 1e-9
petsc_python_executable = /home/weiyy/anaconda3/envs/pybind_env/bin/python3
petsc_solver_script = python/petsc_pressure_solver.py
petsc_solver_config = python/petsc_pressure_options.py

ch_inner_iterations = 80
ch_tolerance = 1e-8
momentum_iterations = 240
momentum_tolerance = 1e-8

lx = 4.0
ly = 4.0
interface_center_x = 2.0
interface_center_y = 1.6
interface_radius = 1.0

re = 10.0
ca = 0.02
cn = 0.0125
pe = 150.0
density_ratio = 1000.0
viscosity_ratio = 100.0

periodic_x = false
periodic_y = false

u_bc_left_type = dirichlet
u_bc_left_value = 0.0
u_bc_right_type = dirichlet
u_bc_right_value = 0.0
u_bc_bottom_type = neumann
u_bc_bottom_value = 0.0
u_bc_top_type = neumann
u_bc_top_value = 0.0

v_bc_left_type = neumann
v_bc_left_value = 0.0
v_bc_right_type = neumann
v_bc_right_value = 0.0
v_bc_bottom_type = dirichlet
v_bc_bottom_value = 0.0
v_bc_top_type = dirichlet
v_bc_top_value = 0.0

advect_u = 0.0
advect_v = 0.0

body_force_x = 0.0
body_force_y = -1.0


check_mass_drift_max = 1e-2
check_divergence_max = 1e-2
check_mu_max = 1e6
check_velocity_max = 50.0
