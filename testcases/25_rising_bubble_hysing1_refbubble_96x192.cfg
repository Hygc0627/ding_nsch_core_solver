# Rising bubble benchmark inspired by Hysing case 1, written in the
# solver's nondimensional form.
#
# Scaling choice:
#   length scale   = bubble radius R0
#   velocity scale = sqrt(g * R0)
#
# With the original dimensional data
#   rho_b = 100, mu_b = 1
#   rho_l = 1000, mu_l = 10
#   sigma = 24.5, g = 0.98, R0 = 0.25
#
# this gives the exact nondimensional parameters used below:
#   Re_bubble = rho_b * U0 * R0 / mu_b = 12.3744
#   Ca_bubble = mu_b * U0 / sigma        = 0.0202031
#   rho_liquid / rho_bubble              = 10
#   mu_liquid / mu_bubble                = 10
#   body_force_y                         = -1
#
# Geometry in R0 units:
#   domain = [0,4] x [0,8]
#   bubble center = (2,2), radius = 1

name = rising_bubble_hysing1_refbubble_96x192
mode = coupled

nx = 96
ny = 192
ghost = 3
dt = 2e-4
steps = 15000
output_every = 500
write_every = 500
restart_every = 500
verbose = false
write_vtk = true
write_restart = true
restart = false
output_dir = output

pressure_scheme = icpcg
poisson_iterations = 500
pressure_tolerance = 1e-9

ch_inner_iterations = 60
ch_tolerance = 1e-8
momentum_iterations = 200
momentum_tolerance = 1e-8

lx = 4.0
ly = 8.0
interface_center_x = 2.0
interface_center_y = 2.0
interface_radius = 1.0

re = 12.374368670764582
ca = 0.02020305007471719
cn = 0.04
pe = 150.0
density_ratio = 10.0
viscosity_ratio = 10.0

periodic_x = false
periodic_y = false
top_wall_velocity_x = 0.0
bottom_wall_velocity_x = 0.0

advect_u = 0.0
advect_v = 0.0

body_force_x = 0.0
body_force_y = -1.0

stabilization_a1 = 4.0
stabilization_a2 = 0.5

check_mass_drift_max = 1e-2
check_divergence_max = 1e-2
check_mu_max = 1e5
check_velocity_max = 20.0
