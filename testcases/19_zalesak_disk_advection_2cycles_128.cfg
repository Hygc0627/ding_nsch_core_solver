# Pure advection of a slotted disk under prescribed solid-body rotation.
# Two full revolutions with angular_velocity = 2*pi.

name = zalesak_disk_advection_2cycles_128
mode = advection_only

nx = 128
ny = 128
ghost = 3
dt = 5e-4
steps = 4000
output_every = 400
write_every = 4000
verbose = false
write_vtk = false
write_restart = false
restart = false
output_dir = output

lx = 1.0
ly = 1.0
periodic_x = true
periodic_y = true

velocity_profile = solid_body_rotation
rotation_center_x = 0.5
rotation_center_y = 0.5
angular_velocity = 6.283185307179586

phase_initializer = zalesak_disk
interface_center_x = 0.5
interface_center_y = 0.75
interface_radius = 0.15
zalesak_slot_width = 0.05
zalesak_slot_depth = 0.25
cn = 0.004

pe = 150.0
re = 1.0
ca = 1.0
density_ratio = 1.0
viscosity_ratio = 1.0
advect_u = 0.0
advect_v = 0.0
top_wall_velocity_x = 0.0
bottom_wall_velocity_x = 0.0
body_force_x = 0.0
body_force_y = 0.0

check_mass_drift_max = 1e-2
check_divergence_max = 1e-10
check_mu_max = 1e-12
check_velocity_max = 5.0
