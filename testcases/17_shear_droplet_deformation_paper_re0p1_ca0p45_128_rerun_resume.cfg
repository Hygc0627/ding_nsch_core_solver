# Resume template for the fresh rerun case.
# Keep `name` and `output_dir` unchanged, and only increase `steps`
# when you want to continue to a later final time.

name = shear_droplet_deformation_paper_re0p1_ca0p45_128_rerun
mode = coupled

# Grid and time
nx = 128
ny = 128
ghost = 3
dt = 1e-5
steps = 200000
output_every = 2000
write_every = 200
restart_every = 200
verbose = false
write_vtk = true
write_restart = true
restart = true
output_dir = output

# Pressure solver
pressure_scheme = icpcg
poisson_iterations = 400
pressure_tolerance = 1e-9

# CH / momentum linear solves
ch_inner_iterations = 50
ch_tolerance = 1e-8
momentum_iterations = 150
momentum_tolerance = 1e-8

# Domain: L = H = 1, droplet radius R0 = 0.25 => L = H = 4 * R0
lx = 1.0
ly = 1.0
interface_center_x = 0.5
interface_center_y = 0.5
interface_radius = 0.25

# Paper-equivalent dimensionless groups
cn = 0.01
pe = 150.0
re = 0.8
ca = 0.9
density_ratio = 1.0
viscosity_ratio = 1.0

# Boundary conditions
periodic_x = true
periodic_y = false
top_wall_velocity_x = 1.0
bottom_wall_velocity_x = -1.0

# Initial velocity
advect_u = 0.0
advect_v = 0.0

# Body force
body_force_x = 0.0
body_force_y = 0.0

# CH stabilization
stabilization_a1 = 4.0
stabilization_a2 = 0.5

# Pass/fail thresholds
check_mass_drift_max = 1e-2
check_divergence_max = 1e-2
check_mu_max = 1e4
check_velocity_max = 10.0
