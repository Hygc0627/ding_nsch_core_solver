# Planar surrogate of the Ding et al. (2007) axisymmetric rising-bubble test.
#
# Important limitation:
#   The paper's benchmark is axisymmetric. This solver is 2D Cartesian, so this
#   case matches the nondimensional groups and slip/no-penetration boundaries,
#   but not the axisymmetric geometry exactly.
#
# Parameters chosen from the more stable convergence-study branch:
#   gas/liquid density ratio      = 0.001  -> liquid/bubble = 1000
#   gas/liquid viscosity ratio    = 0.01   -> liquid/bubble = 100
#   Re_liquid                     = 100
#   Bo                            = 200
# With velocity scale U0 = sqrt(g R), the solver's bubble-based parameters are:
#   Re_bubble = 10
#   Ca_bubble = Bo / Re_liquid * mu_g/mu_l = 0.02
#
# We use a planar full-width analogue of the paper's 2R x 4R axisymmetric box:
#   domain = [0,4R] x [0,4R]
#   bubble center = (2R, 1.6R), radius = R
#
# Boundary conditions approximate slip + no penetration:
#   left/right:   u = 0, d(v)/dx = 0
#   top/bottom:   v = 0, d(u)/dy = 0

name = rising_bubble_ding2007_planar_stable
mode = coupled

nx = 128
ny = 128
ghost = 3
dt = 1e-4
steps = 10000
output_every = 500
write_every = 500
restart_every = 500
verbose = false
write_vtk = true
write_restart = true
restart = false
output_dir = output

pressure_scheme = paper_split_icpcg
poisson_iterations = 800
pressure_tolerance = 1e-9

ch_inner_iterations = 80
ch_tolerance = 1e-8
momentum_iterations = 240
momentum_tolerance = 1e-8

lx = 4.0
ly = 4.0
interface_center_x = 2.0
interface_center_y = 1.6
interface_radius = 1.0

re = 10.0
ca = 0.02
cn = 0.0125
pe = 150.0
density_ratio = 1000.0
viscosity_ratio = 100.0

periodic_x = false
periodic_y = false

u_bc_left_type = dirichlet
u_bc_left_value = 0.0
u_bc_right_type = dirichlet
u_bc_right_value = 0.0
u_bc_bottom_type = neumann
u_bc_bottom_value = 0.0
u_bc_top_type = neumann
u_bc_top_value = 0.0

v_bc_left_type = neumann
v_bc_left_value = 0.0
v_bc_right_type = neumann
v_bc_right_value = 0.0
v_bc_bottom_type = dirichlet
v_bc_bottom_value = 0.0
v_bc_top_type = dirichlet
v_bc_top_value = 0.0

advect_u = 0.0
advect_v = 0.0

body_force_x = 0.0
body_force_y = -1.0

stabilization_a1 = 4.0
stabilization_a2 = 0.5

check_mass_drift_max = 1e-2
check_divergence_max = 1e-2
check_mu_max = 1e6
check_velocity_max = 50.0
