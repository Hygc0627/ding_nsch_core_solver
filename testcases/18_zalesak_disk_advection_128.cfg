# Pure advection of a slotted disk under prescribed solid-body rotation.
# One full revolution corresponds to dt * steps = 1 when angular_velocity = 2*pi.

name = zalesak_disk_advection_128
mode = advection_only

# Grid and time
nx = 128
ny = 128
ghost = 3
dt = 5e-4
steps = 2000
output_every = 200
write_every = 100
verbose = false
write_vtk = true
write_restart = false
restart = false
output_dir = output

# Domain and periodic boundaries
lx = 1.0
ly = 1.0
periodic_x = true
periodic_y = true

# Prescribed velocity field: one full turn over unit time
velocity_profile = solid_body_rotation
rotation_center_x = 0.5
rotation_center_y = 0.5
angular_velocity = 6.283185307179586

# Initial interface: Zalesak slotted disk
phase_initializer = zalesak_disk
interface_center_x = 0.5
interface_center_y = 0.75
interface_radius = 0.15
zalesak_slot_width = 0.05
zalesak_slot_depth = 0.25
cn = 0.004

# Unused flow parameters in advection-only mode
pe = 150.0
re = 1.0
ca = 1.0
density_ratio = 1.0
viscosity_ratio = 1.0
advect_u = 0.0
advect_v = 0.0
top_wall_velocity_x = 0.0
bottom_wall_velocity_x = 0.0
body_force_x = 0.0
body_force_y = 0.0

# Pass/fail thresholds
check_mass_drift_max = 1e-2
check_divergence_max = 1e-10
check_mu_max = 1e-12
check_velocity_max = 5.0
