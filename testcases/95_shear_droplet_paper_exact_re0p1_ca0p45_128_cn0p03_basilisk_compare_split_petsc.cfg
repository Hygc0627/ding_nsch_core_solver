# Shear-driven droplet deformation for direct comparison against Basilisk.
#
# Physical/numerical benchmark parameters are copied from testcase 23:
#   shear_droplet_paper_exact_re0p1_ca0p45_128_cn0p03
#
# Therefore the nondimensional meanings remain exactly:
#   Re = rho * gamma_dot * R0^2 / mu = 0.1
#   Ca = mu * gamma_dot * R0 / sigma = 0.45
#   H  = 4 * R0
#   alpha = 1
#   lambda = 1
#
# Geometry and shear scaling inside this solver:
#   R0 = 1, H = L = 4, gamma_dot = 1
#   u_top = +2, u_bottom = -2
#
# Compared with testcase 23, this case changes only the pressure backend to
# the current split in-house ICCG solver so the run can be compared against
# Basilisk without relying on external PETSc scripts.
#
# Suggested post-processing:
#   python python/postprocess_taylor_deformation.py --config <this cfg>

name = shear_droplet_paper_exact_re0p1_ca0p45_128_cn0p03_basilisk_compare_split_icpcg
mode = coupled

# Grid and time
nx = 128
ny = 128
ghost = 3
dt = 1.2e-4
steps = 250000
output_every = 1000
write_every = 1000
restart_every = 1000
verbose = false
write_vtk = true
write_restart = true
restart = false
output_dir = output

# Pressure solver: split projection + in-house ICCG
pressure_scheme = paper_split_icpcg
poisson_iterations = 400
pressure_tolerance = 1e-9

# CH / momentum linear solves
ch_inner_iterations = 60
ch_tolerance = 1e-8
momentum_iterations = 180
momentum_tolerance = 1e-8

# Geometry in units of R0
lx = 4.0
ly = 4.0
interface_center_x = 2.0
interface_center_y = 2.0
interface_radius = 1.0

# Dimensionless groups with the exact paper meanings
re = 0.1
ca = 0.45
cn = 0.03
pe = 150.0
density_ratio = 1.0
viscosity_ratio = 1.0

# Boundary conditions
periodic_x = true
periodic_y = false
top_wall_velocity_x = 2.0
bottom_wall_velocity_x = -2.0

# Initial velocity
advect_u = 0.0
advect_v = 0.0

# Body force
body_force_x = 0.0
body_force_y = 0.0


# Pass/fail thresholds
check_mass_drift_max = 1e-2
check_divergence_max = 1e-2
check_mu_max = 1e4
check_velocity_max = 10.0
