# Static droplet validation case for:
# 1) Laplace pressure balance / surface-tension accuracy
# 2) parasitic-current magnitude
#
# Same numerical setup as testcase 98, except:
# - pressure solve uses split HyDEA
# - HyDEA schedule alternates 10 CG steps and 2 ML steps

name = static_droplet_surface_tension_validation_192_hydea_10cg2ml
mode = coupled

# Grid / output
nx = 192
ny = 192
ghost = 3
dt = 2e-7
steps = 1000
output_every = 100
write_every = 500
restart_every = 500
verbose = false
print_step_log = true
write_vtk = true
write_restart = true
restart = false
output_dir = output/99

# Solvers
pressure_scheme = paper_split_hydea
poisson_iterations = 1200
pressure_tolerance = 1e-6
petsc_python_executable = /home/weiyy/anaconda3/envs/pybind_env/bin/python3
hydea_solver_script = python/hydea_pressure_solver.py
hydea_solver_config = python/hydea_pressure_options_alternating_10_2.py
hydea_model_path = /home/weiyy/phaseField/dinghang/HyDEA/PetIBM/examples/navierstokesHyDEA/192cavity/Logger/fluid model net fluid_model/2024-07-10 175806/states/1000.state
petsc_pressure_log_every = 1

ch_inner_iterations = 80
ch_tolerance = 1e-8
momentum_iterations = 200
momentum_tolerance = 1e-8

# Domain / droplet
lx = 1.0
ly = 1.0
interface_center_x = 0.5
interface_center_y = 0.5
interface_radius = 0.16

# Dimensionless parameters
re = 50.0
ca = 1.0
cn = 0.02
pe = 150.0
density_ratio = 1.0
viscosity_ratio = 1.0
surface_tension_multiplier = 1.0

# Keep the droplet away from walls so pressure jump and spurious currents
# are dominated by interface discretization rather than boundary treatment.
periodic_x = true
periodic_y = true

# Start from rest
advect_u = 0.0
advect_v = 0.0
body_force_x = 0.0
body_force_y = 0.0

# Loose enough to avoid false FAIL while still flagging obvious instability
check_mass_drift_max = 1e-5
check_divergence_max = 1e-6
check_mu_max = 1e4
check_velocity_max = 1.0
