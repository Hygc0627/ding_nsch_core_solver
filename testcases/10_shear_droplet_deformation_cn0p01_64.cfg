# Shear-driven droplet deformation
# Thinner interface variant on the original 64x64 grid.
#
# Compared with 09_shear_droplet_deformation_reference.cfg:
# - cn is reduced from 0.02 to 0.01
# - dt is reduced accordingly for a safer startup
# - final_time is kept at 0.4
#
# This case gives a sharper interface, but only about 4 cells across the
# 10%-90% transition width, so it is still a compromise case.

name = shear_droplet_deformation_cn0p01_64
mode = coupled

# Grid and time
nx = 64
ny = 64
ghost = 3
dt = 5e-6
steps = 80000
output_every = 1000
write_every = 100
verbose = false
write_vtk = true
output_dir = output

# Pressure solver
pressure_scheme = icpcg
poisson_iterations = 300
pressure_tolerance = 1e-9

# CH / momentum linear solves
ch_inner_iterations = 40
ch_tolerance = 1e-8
momentum_iterations = 120
momentum_tolerance = 1e-8

# Domain: L = H = 1, droplet radius R0 = 0.25 => L = H = 4 * R0
lx = 1.0
ly = 1.0
interface_center_x = 0.5
interface_center_y = 0.5
interface_radius = 0.25

# Dimensionless groups
cn = 0.01
pe = 150.0
re = 0.1
ca = 0.45
density_ratio = 1.0
viscosity_ratio = 1.0

# Boundary conditions
periodic_x = true
periodic_y = false
top_wall_velocity_x = 1.0
bottom_wall_velocity_x = -1.0

# Initial velocity
advect_u = 0.0
advect_v = 0.0

# Body force
body_force_x = 0.0
body_force_y = 0.0

# CH stabilization
stabilization_a1 = 4.0
stabilization_a2 = 0.5

# Pass/fail thresholds
check_mass_drift_max = 1e-2
check_divergence_max = 1e-2
check_mu_max = 1e4
check_velocity_max = 10.0
