# Single-phase Couette-type shear baseline for pressure-residual analysis.
# Non-periodic on all sides; pressure uses explicit Neumann BC on all four sides.
# This starts from the exact linear Couette profile, so its pressure residuals
# are expected to be trivial or nearly trivial. It is still useful as a baseline
# for confirming that the logging/output chain works.
# The PETSc pressure solve uses split projection + CG + ICC and writes a
# residual log at every step.

name = single_phase_shear_petsc_icpcg_monitor
mode = single_phase

# Grid and time
nx = 128
ny = 128
ghost = 3
dt = 1.2e-4
steps = 1000
output_every = 100
write_every = 100
restart_every = 0
verbose = false
write_vtk = false
write_restart = false
restart = false
output_dir = output

# Pressure solver: split PETSc-backed CG + ICC with per-step iteration logs
pressure_scheme = paper_split_petsc_pcg
poisson_iterations = 1500
pressure_tolerance = 1e-10
petsc_python_executable = /home/weiyy/anaconda3/envs/pybind_env/bin/python3
petsc_solver_script = python/petsc_pressure_solver.py
petsc_solver_config = python/petsc_pressure_options_icpcg_monitor.py
petsc_pressure_log_every = 1

# Momentum solve
momentum_iterations = 180
momentum_tolerance = 1e-8

# These fields are unused in single_phase mode but kept explicit for consistency
ch_inner_iterations = 1
ch_tolerance = 1e-8
lx = 4.0
ly = 4.0
re = 0.1
ca = 0.45
cn = 0.03
pe = 150.0
density_ratio = 1.0
viscosity_ratio = 1.0
invert_phase = false

# Shear setup: two plates moving at constant opposite speeds
top_wall_velocity_x = 2.0
bottom_wall_velocity_x = -2.0
periodic_x = false
periodic_y = false

u_bc_left_type = neumann
u_bc_left_value = 0.0
u_bc_right_type = neumann
u_bc_right_value = 0.0
u_bc_bottom_type = dirichlet
u_bc_bottom_value = -2.0
u_bc_top_type = dirichlet
u_bc_top_value = 2.0

v_bc_left_type = dirichlet
v_bc_left_value = 0.0
v_bc_right_type = dirichlet
v_bc_right_value = 0.0
v_bc_bottom_type = dirichlet
v_bc_bottom_value = 0.0
v_bc_top_type = dirichlet
v_bc_top_value = 0.0

pressure_bc_left_type = neumann
pressure_bc_left_value = 0.0
pressure_bc_right_type = neumann
pressure_bc_right_value = 0.0
pressure_bc_bottom_type = neumann
pressure_bc_bottom_value = 0.0
pressure_bc_top_type = neumann
pressure_bc_top_value = 0.0

# Initial velocity
advect_u = 0.0
advect_v = 0.0

# Body force
body_force_x = 0.0
body_force_y = 0.0

# Pass/fail thresholds
check_mass_drift_max = 1e-10
check_divergence_max = 1e-4
check_mu_max = 1e-10
check_velocity_max = 5.0
