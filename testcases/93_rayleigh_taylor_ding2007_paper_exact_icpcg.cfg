# Rayleigh-Taylor instability reconstructed from
# Ding et al., JCP 226 (2007), §4.2.1.
#
# Paper parameters stated explicitly in the RTI subsection:
#   At = 0.50
#   Re = 3000, with Re = rho_A * d^(3/2) * g^(1/2) / mu_A
#   zero surface tension
#   domain [0,d] x [0,4d]
#   initial interface y(x,0) = 2d + 0.1d*cos(2*pi*x/d)
#   grid 200 x 800
#   Cn = 0.3 h = 0.0015
#   dt = 0.00035
#
# Additional paper-wide parameter used unless otherwise mentioned:
#   Pe = 2 / epsilon
# For this case we choose d = 1, so epsilon = Cn = 0.0015 and therefore
#   Pe = 2 / 0.0015 = 1333.3333333333333
#
# Mapping to this solver:
#   - c = 1 is the reference/heavy fluid A
#   - density_ratio = rho_B / rho_A = 1/3 from At = (rho_A - rho_B)/(rho_A + rho_B) = 0.5
#   - invert_phase = true puts the heavy fluid above the light fluid
#   - viscosity_ratio is not restated in §4.2.1; use 1.0 (equal viscosities)
#   - body_force_y = -1 corresponds to the paper's gravity scaling with U = sqrt(g d)
#   - pressure_scheme = icpcg is a portability choice for this codebase, not a paper parameter
#
# Output cadence:
#   dt = 3.5e-4 and write_every = 357 gives snapshots every ~0.125 time units,
#   close to the Fig. 6 times t = 0, 1, 1.25, 1.5, ..., 2.5.

name = 93_rayleigh_taylor_ding2007_paper_exact_icpcg
mode = coupled

nx = 200
ny = 800
ghost = 3
dt = 3.5e-4
steps = 7143
output_every = 357
write_every = 357
restart_every = 714
verbose = false
print_step_log = true
write_vtk = true
write_restart = true
restart = false
output_dir = output

pressure_scheme = icpcg
poisson_iterations = 3000
pressure_tolerance = 1e-6

ch_inner_iterations = 120
ch_tolerance = 1e-8
momentum_iterations = 240
momentum_tolerance = 1e-8

lx = 1.0
ly = 4.0
interface_radius = 0.0
interface_center_y = 2.0
interface_amplitude = 0.1
interface_wavenumber = 1.0
invert_phase = true

re = 3000.0
ca = 1.0
pe = 1333.3333333333333
cn = 0.0015
density_ratio = 0.3333333333333333
viscosity_ratio = 1.0
surface_tension_multiplier = 0.0

periodic_x = true
periodic_y = false

u_bc_bottom_type = neumann
u_bc_bottom_value = 0.0
u_bc_top_type = neumann
u_bc_top_value = 0.0

v_bc_bottom_type = dirichlet
v_bc_bottom_value = 0.0
v_bc_top_type = dirichlet
v_bc_top_value = 0.0

advect_u = 0.0
advect_v = 0.0

body_force_x = 0.0
body_force_y = -1.0

check_mass_drift_max = 5e-2
check_divergence_max = 5e-2
check_mu_max = 1e8
check_velocity_max = 50.0
