# Equal-density shear-driven droplet deformation for pressure-residual analysis.
# The whole initial velocity field is the Couette profile, so the droplet starts
# with the same velocity as the surrounding fluid.
# Split PETSc CG + ICC writes a pressure-residual log at every step.

name = shear_droplet_equal_density_petsc_icpcg_monitor
mode = coupled

# Grid and time
nx = 128
ny = 128
ghost = 3
dt = 1.2e-4
steps = 1000
output_every = 100
write_every = 100
restart_every = 0
verbose = false
write_vtk = false
write_restart = false
restart = false
output_dir = output

# Pressure solver: split PETSc-backed CG + ICC with per-step iteration logs
pressure_scheme = paper_split_petsc_pcg
poisson_iterations = 1500
pressure_tolerance = 1e-10
petsc_python_executable = /home/weiyy/anaconda3/envs/pybind_env/bin/python3
petsc_solver_script = python/petsc_pressure_solver.py
petsc_solver_config = python/petsc_pressure_options_icpcg_monitor.py
petsc_pressure_log_every = 1

# CH / momentum linear solves
ch_inner_iterations = 60
ch_tolerance = 1e-8
momentum_iterations = 180
momentum_tolerance = 1e-8

# Geometry and material parameters
lx = 4.0
ly = 4.0
interface_center_x = 2.0
interface_center_y = 2.0
interface_radius = 1.0
re = 0.1
ca = 0.45
cn = 0.03
pe = 150.0
density_ratio = 1.0
viscosity_ratio = 1.0

# Shear setup: two plates moving at constant opposite speeds
top_wall_velocity_x = 2.0
bottom_wall_velocity_x = -2.0
periodic_x = false
periodic_y = false

u_bc_left_type = neumann
u_bc_left_value = 0.0
u_bc_right_type = neumann
u_bc_right_value = 0.0
u_bc_bottom_type = dirichlet
u_bc_bottom_value = -2.0
u_bc_top_type = dirichlet
u_bc_top_value = 2.0

v_bc_left_type = dirichlet
v_bc_left_value = 0.0
v_bc_right_type = dirichlet
v_bc_right_value = 0.0
v_bc_bottom_type = dirichlet
v_bc_bottom_value = 0.0
v_bc_top_type = dirichlet
v_bc_top_value = 0.0

pressure_bc_left_type = neumann
pressure_bc_left_value = 0.0
pressure_bc_right_type = neumann
pressure_bc_right_value = 0.0
pressure_bc_bottom_type = neumann
pressure_bc_bottom_value = 0.0
pressure_bc_top_type = neumann
pressure_bc_top_value = 0.0

# Initial velocity
advect_u = 0.0
advect_v = 0.0

# Body force
body_force_x = 0.0
body_force_y = 0.0

# CH stabilization
stabilization_a1 = 4.0
stabilization_a2 = 0.5

# Pass/fail thresholds
check_mass_drift_max = 1e-2
check_divergence_max = 1e-2
check_mu_max = 1e4
check_velocity_max = 10.0
